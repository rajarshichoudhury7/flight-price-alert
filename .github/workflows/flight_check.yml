name: Flight Price Alert – SYD → MAA

on:
  schedule:
    - cron: "0 3,11,19 * * *"  # Runs at 03:00, 11:00, 19:00 UTC (08:30, 16:30, 00:30 IST)
  workflow_dispatch:          # Allows manual trigger from GitHub UI

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check flights (rotating date Jun 27 – Jul 4)
        run: python flight_checker.py
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PRICE_THRESHOLD_INR: "60000"
          ADULTS: "1"
